on:
    pull_request:
        types:
            - opened

jobs:
    testing-docker-action:
        runs-on: ubuntu-latest

        permissions:
            issues: write
            pull-requests: write

        steps:
            - name: "Checkout Repository"
              run: actions/checkout@v6

            - name: Post PR Comment
              uses: ./
              with:
                  github-token: ${{ secrets.GITHUB_TOKEN }}
                  giphy-api-key: ${{ secrets.GIPHY_API_KEY }}
